name: Publicar preview

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publicar-preview
  cancel-in-progress: true

jobs:
  publicar-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Gerar preview em preview/
        run: ./scripts/publicar-preview.sh

      - name: Verificar alterações do preview
        id: preview_changes
        shell: bash
        run: |
          if git status --porcelain -- preview | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commitar preview atualizado
        if: steps.preview_changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add preview
          git commit -m "Publica preview do frontend"
          git push
